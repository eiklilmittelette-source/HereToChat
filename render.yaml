databases:
  - name: heretochat-db
    plan: free
    databaseName: heretochat
    user: heretochat

services:
  - type: web
    name: heretochat
    runtime: node
    buildCommand: cd client && npm install && npx vite build && cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: heretochat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VAPID_PUBLIC
        value: BNg_6K3VX7iLgivMYbQcKvwfglDQ_bKCsd-_UpS185prwBEtXdpu_Tyd3eWrbYPpQkwdFEXYOUfPAfmp-TNyoVM
